<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#050510; --neon:#00f7ff; --pink:#ff2bd6; --yellow:#ffe76a; --green:#48ff83; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; overflow: hidden;
      background: radial-gradient(circle at 50% 20%, #1a1a3a 0%, var(--bg) 55%);
      color: #fff; font-family: 'VT323', monospace;
    }
    .scanlines::before {
      content: ""; position: fixed; inset: 0; pointer-events: none;
      background: repeating-linear-gradient(to bottom, rgba(255,255,255,.04), rgba(255,255,255,.04) 1px, transparent 2px, transparent 4px);
      mix-blend-mode: soft-light; animation: drift 6s linear infinite;
    }
    @keyframes drift { from {transform:translateY(0)} to {transform:translateY(4px)} }

    .stars { position: fixed; inset: 0; background-image:
      radial-gradient(2px 2px at 15% 30%, #fff, transparent),
      radial-gradient(2px 2px at 80% 60%, #fff, transparent),
      radial-gradient(1px 1px at 60% 20%, #fff, transparent),
      radial-gradient(2px 2px at 40% 80%, #fff, transparent);
      animation: twinkle 3s ease-in-out infinite alternate;
      opacity:.55;
    }
    @keyframes twinkle { from{opacity:.35} to{opacity:.75} }

    .wrap { position: relative; z-index: 2; display:grid; place-items:center; min-height:100vh; padding:24px; }
    .cabinet {
      width:min(880px, 100%); border:4px solid var(--neon); border-radius:18px;
      background: linear-gradient(160deg, rgba(10,20,40,.88), rgba(25,10,35,.84));
      box-shadow: 0 0 18px var(--neon), 0 0 48px rgba(0,247,255,.4), inset 0 0 32px rgba(255,255,255,.06);
      padding: 28px;
    }
    .marquee {
      font-family:'Press Start 2P', monospace; text-align:center; font-size: clamp(18px, 2.4vw, 34px);
      color: var(--yellow); text-shadow:0 0 10px var(--yellow), 0 0 26px #ff8f00;
      animation: pulse 1.5s ease-in-out infinite alternate;
      margin-bottom: 18px;
    }
    @keyframes pulse { from{transform:scale(1)} to{transform:scale(1.03)} }

    .screen {
      border:3px solid var(--pink); border-radius:12px; padding:20px;
      background: #070b18; box-shadow: inset 0 0 20px rgba(255,43,214,.25);
      min-height: 250px; display:grid; place-items:center; text-align:center;
    }
    .hello {
      font-family:'Press Start 2P', monospace;
      font-size: clamp(16px, 3vw, 42px);
      line-height:1.4;
      color: var(--green);
      text-shadow: 0 0 8px var(--green), 0 0 28px rgba(72,255,131,.5);
      animation: glitch 2.2s infinite;
    }
    @keyframes glitch {
      0%, 100% { transform: translate(0,0); filter:hue-rotate(0deg); }
      20% { transform: translate(2px,-1px); }
      21% { transform: translate(-2px,1px); }
      45% { transform: translate(1px,0); filter:hue-rotate(18deg); }
      46% { transform: translate(-1px,0); }
      70% { transform: translate(0,1px); }
    }
    .sub { margin-top: 14px; font-size: clamp(18px, 2.2vw, 30px); color:#9ee8ff; }
    .coins { margin-top: 16px; font-size: 22px; color: var(--yellow); letter-spacing: 2px; }
    .coin { display:inline-block; animation: bounce 900ms ease-in-out infinite; }
    .coin:nth-child(2){animation-delay:.1s}.coin:nth-child(3){animation-delay:.2s}
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }

    .footer { text-align:center; margin-top:16px; color:#8aa0c7; font-size:20px; }
  </style>
</head>
<body class="scanlines">
  <div class="stars"></div>
  <div class="wrap">
    <main class="cabinet">
      <div class="marquee">KAREN ARCADE SYSTEM v1.0</div>
      <section class="screen">
        <div>
          <div class="hello">HELLO<br>WORLD</div>
          <div class="sub">INSERT IDEAS. PRESS START. SHIP FAST.</div>
          <div class="coins"><span class="coin">🪙</span> <span class="coin">🪙</span> <span class="coin">🪙</span></div>
        </div>
      </section>
      <div class="footer">Deployed by Karen • OpenClaw x Vercel</div>
    </main>
  </div>
</body>
</html>
